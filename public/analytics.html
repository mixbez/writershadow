<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WriterShadow Analytics</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      margin-bottom: 30px;
      text-align: center;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .controls {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .controls input {
      padding: 10px 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }

    .controls button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.3s;
    }

    .controls button:hover {
      background: #764ba2;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-label {
      color: #666;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 2.5em;
      font-weight: bold;
      color: #667eea;
      line-height: 1;
    }

    .stat-subtitle {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
    }

    .table-section {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      overflow-x: auto;
    }

    .table-section h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.5em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #f5f5f5;
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #ddd;
      font-size: 14px;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #eee;
      color: #666;
      font-size: 14px;
    }

    tr:hover {
      background: #f9f9f9;
    }

    .status-badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-active {
      background: #d4edda;
      color: #155724;
    }

    .status-inactive {
      background: #f8d7da;
      color: #721c24;
    }

    .loading {
      text-align: center;
      color: white;
      font-size: 18px;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .chart-container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }

    .chart-container h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.5em;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.8em;
      }

      .controls {
        flex-direction: column;
      }

      .controls input,
      .controls button {
        width: 100%;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 10px 5px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 WriterShadow Analytics</h1>

    <div class="controls">
      <label>
        От:
        <input type="date" id="dateFrom">
      </label>
      <label>
        До:
        <input type="date" id="dateTo">
      </label>
      <button onclick="loadAnalytics()">Обновить</button>
      <button onclick="loadToday()">Сегодня</button>
      <button onclick="loadLastWeek()">Последняя неделя</button>
      <button onclick="loadLastMonth()">Последний месяц</button>
    </div>

    <div id="error" class="error" style="display: none;"></div>

    <div id="loading" class="loading" style="display: none;">
      Загрузка данных...
    </div>

    <div id="content" style="display: none;">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="table-section">
        <h2>Статистика по пользователям</h2>
        <table id="usersTable">
          <thead>
            <tr>
              <th>Username</th>
              <th>Всего знаков</th>
              <th>Черновиков</th>
              <th>Постов</th>
              <th>Активных дней</th>
            </tr>
          </thead>
          <tbody id="tableBody">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // Set date inputs to today and 30 days ago
    function initDates() {
      const today = new Date();
      const thirtyDaysAgo = new Date(today);
      thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

      document.getElementById('dateTo').valueAsDate = today;
      document.getElementById('dateFrom').valueAsDate = thirtyDaysAgo;
    }

    function showLoading(show = true) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
      document.getElementById('content').style.display = show ? 'none' : 'block';
      document.getElementById('error').style.display = 'none';
    }

    function showError(message) {
      document.getElementById('error').textContent = '❌ ' + message;
      document.getElementById('error').style.display = 'block';
      document.getElementById('content').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
    }

    async function loadAnalytics() {
      showLoading(true);
      try {
        const dateFrom = document.getElementById('dateFrom').value;
        const dateTo = document.getElementById('dateTo').value;

        if (!dateFrom || !dateTo) {
          showError('Выберите диапазон дат');
          return;
        }

        const response = await fetch(`/api/analytics?from=${dateFrom}&to=${dateTo}`);
        if (!response.ok) {
          throw new Error('Ошибка сервера');
        }

        const data = await response.json();
        renderAnalytics(data);
        showLoading(false);
      } catch (error) {
        showError(error.message);
      }
    }

    function renderAnalytics(data) {
      const { global, users } = data;

      // Render global stats
      const statsHtml = `
        <div class="stat-card">
          <div class="stat-label">Всего знаков</div>
          <div class="stat-value">${(global.total_chars || 0).toLocaleString()}</div>
          <div class="stat-subtitle">за выбранный период</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Черновиков</div>
          <div class="stat-value">${(global.total_drafts || 0).toLocaleString()}</div>
          <div class="stat-subtitle">за выбранный период</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Постов опубликовано</div>
          <div class="stat-value">${(global.total_posts || 0).toLocaleString()}</div>
          <div class="stat-subtitle">за выбранный период</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Активных пользователей</div>
          <div class="stat-value">${global.active_users || 0}</div>
          <div class="stat-subtitle">с активностью</div>
        </div>
      `;
      document.getElementById('statsGrid').innerHTML = statsHtml;

      // Render users table
      let tableHtml = '';
      if (users && users.length > 0) {
        tableHtml = users
          .map(user => `
            <tr>
              <td>${user.username || `User #${user.telegram_user_id}`}</td>
              <td>${(user.total_chars || 0).toLocaleString()}</td>
              <td>${user.total_drafts || 0}</td>
              <td>${user.total_posts || 0}</td>
              <td>${user.active_days || 0}</td>
            </tr>
          `)
          .join('');
      } else {
        tableHtml = '<tr><td colspan="5" class="empty-state">Нет данных за выбранный период</td></tr>';
      }
      document.getElementById('tableBody').innerHTML = tableHtml;
    }

    function loadToday() {
      const today = new Date();
      document.getElementById('dateFrom').valueAsDate = today;
      document.getElementById('dateTo').valueAsDate = today;
      loadAnalytics();
    }

    function loadLastWeek() {
      const today = new Date();
      const sevenDaysAgo = new Date(today);
      sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
      document.getElementById('dateFrom').valueAsDate = sevenDaysAgo;
      document.getElementById('dateTo').valueAsDate = today;
      loadAnalytics();
    }

    function loadLastMonth() {
      const today = new Date();
      const thirtyDaysAgo = new Date(today);
      thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
      document.getElementById('dateFrom').valueAsDate = thirtyDaysAgo;
      document.getElementById('dateTo').valueAsDate = today;
      loadAnalytics();
    }

    // Initialize on page load
    window.addEventListener('load', () => {
      initDates();
      loadAnalytics();
    });
  </script>
</body>
</html>
